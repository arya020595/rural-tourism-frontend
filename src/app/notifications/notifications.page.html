<ion-content>
  <!-- Header -->
  <div class="header-container">
    <ion-button
      class="back-button"
      fill="clear"
      (click)="backHome()"
      mode="ios"
    >
      <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
    </ion-button>

    <div class="header-center">
      <ion-img class="logo" src="../../assets/icon/rt logo.png"></ion-img>
      <h2 class="page-title">Notifications</h2>
    </div>

    <div class="divider"></div>
  </div>

  <!-- Notifications List -->
  <ion-list *ngIf="notifications.length > 0" class="notification-list">
    <ion-item
      *ngFor="let notification of notifications"
      (click)="markAsRead(notification)"
      class="notification-item"
      [class.unread]="!notification.read"
    >
      <!-- Avatar -->
      <div class="avatar-circle">{{ getAvatarLetter(notification) }}</div>

      <!-- Content -->
      <ion-label class="notification-content">
        <p class="notif-message">{{ notification.message }}</p>
        <!-- Pass the createdAt string to timeAgo -->
        <small class="notif-time">{{ timeAgo(notification.createdAt) }}</small>
      </ion-label>
    </ion-item>
  </ion-list>

  <!-- Empty State -->
  <div class="no-notifications" *ngIf="notifications.length === 0">
    <ion-img
      class="no-notification-img"
      src="../../assets/icon/no-notifications-icon.png"
    ></ion-img>
    <p class="no-text">No new notifications yet...</p>
  </div>
</ion-content>
