<ion-content [fullscreen]="true" class="background">
  <!--
    Legacy operator login UI kept intentionally for quick restore after the meeting session.
    Uncomment this block and comment the register-only card below to re-enable full login mode.

    <ion-header collapse="condense"></ion-header>
    <div class="card-container">
      <ion-card>
        <ion-button fill="clear" (click)="backRole()" mode="ios">
          <ion-icon slot="start" name="chevron-back"></ion-icon>
          <span>Back</span>
        </ion-button>
        <ion-row>
          <ion-col class="ion-blue-bkg">
            <img src="../../assets/icon/rt logo.png" class="borneo" />
          </ion-col>
          <ion-col class="title-col" size="12">
            <p class="title">Log Masuk</p>
            <p class="subtitle">Ke dalam Akaun Pengandali</p>
          </ion-col>
          <ion-col size="12" class="welcome">
            <form class="no-border" #form="ngForm" (ngSubmit)="login(form)">
              ...
              <ion-button mode="ios" type="submit" color="primary" class="input-button" expand="block">
                Log Masuk
              </ion-button>
              <ion-button fill="clear" mode="ios" (click)="register()" color="primary" class="input-button" expand="block">
                Daftar / Register
              </ion-button>
            </form>
          </ion-col>
        </ion-row>
      </ion-card>
    </div>
  -->

  <div class="card-container">
    <ion-card class="register-card">
      <img
        src="../../assets/icon/explore_sabah-without_bg.png"
        class="borneo"
      />
      <p class="title">Pendaftaran Pengendali</p>
      <p class="subtitle">Operator Registration</p>
      <ion-button
        mode="ios"
        (click)="register()"
        class="register-button"
        expand="block"
      >
        <span class="register-label-desktop"
          >Daftar Akaun / Register Account</span
        >
        <span class="register-label-mobile"
          >Daftar Akaun<br />/ Register Account</span
        >
      </ion-button>
      <div class="powered-by-card" aria-label="Powered by Datablu">
        <span class="powered-by-text">Powered by:</span>
        <img
          src="../../assets/icon/Datablu.png"
          alt="Datablu"
          class="powered-by-logo"
        />
      </div>
    </ion-card>
  </div>
</ion-content>
