<!-- side menu -->
<app-side-nav
  [menuId]="'home-menu'"
  [contentId]="'home-main-content'"
  [user]="user"
  [menuItems]="menuItems"
  [showHeaderLogo]="true"
  [logoutLabel]="'Log Keluar/Log-Out'"
  (menuItemTap)="onMenuItemTap($event)"
  (logoutTap)="logOut()"
></app-side-nav>

<!-- main content -->

<ion-header style="height: 5vh; box-shadow: none">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="home-menu" style="color: white"></ion-menu-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button
        (click)="goToNotifications()"
        class="notification-button"
        *hasPermission="'booking:read'"
      >
        <ion-icon
          class="notification-bell"
          slot="icon-only"
          name="notifications"
        ></ion-icon>
        <ion-badge
          *ngIf="unreadCount > 0"
          color="danger"
          class="notification-badge"
        >
          {{ unreadCount }}
        </ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" id="home-main-content">
  <ion-card class="main-Container ion-no-margin">
    <!-- <ion-button expand="block" (click)="openFirstMenu()">Open First Menu</ion-button> -->

    <!-- <ion-card-header style="position: relative; right: 0; left: 0;"> -->
    <!-- <ion-col size-md="3" size="6" class="ion-padding ion-blue-bkg"> -->
    <ion-card-content>
      <ion-col class="center">
        <!-- <ion-img class="logo" src="../../assets/icon/rt logo.png"></ion-img> -->
        <app-header-logo></app-header-logo>
      </ion-col>
    </ion-card-content>

    <!-- </ion-col> -->

    <!-- <div id="container"> -->
    <!-- </div> -->

    <!-- </ion-card-header> -->

    <!-- <h2>{{ user.username }}</h2> -->
    <ion-card-content
      style="margin-top: 15%; padding-left: 0%; padding-right: 0%"
    >
      <ion-card class="dashboard-placeholder-card">
        <ion-card-content class="dashboard-placeholder-content">
          <ion-icon
            name="grid-outline"
            class="dashboard-placeholder-icon"
          ></ion-icon>
          <ion-card-title class="dashboard-placeholder-title"
            >Dashboard</ion-card-title
          >
          <ion-text class="dashboard-placeholder-text">
            Dashboard is not finished yet.
          </ion-text>
        </ion-card-content>
      </ion-card>
    </ion-card-content>
  </ion-card>
</ion-content>
