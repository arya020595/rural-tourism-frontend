<!-- side menu -->
<app-side-nav
  [menuId]="'e-receipt-menu'"
  [contentId]="'e-receipt-main-content'"
  [user]="user"
  [menuItems]="menuItems"
  [showHeaderLogo]="true"
  [logoutLabel]="'Log Keluar/Log-Out'"
  (menuItemTap)="onMenuItemTap($event)"
  (logoutTap)="logOut()"
></app-side-nav>

<!-- main content -->

<ion-header style="height: 5vh; box-shadow: none">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button
        menu="e-receipt-menu"
        style="color: white"
      ></ion-menu-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button (click)="goToNotifications()" class="notification-button">
        <ion-icon
          class="notification-bell"
          slot="icon-only"
          name="notifications"
        ></ion-icon>
        <ion-badge
          *ngIf="unreadCount > 0"
          color="danger"
          class="notification-badge"
        >
          {{ unreadCount }}
        </ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" id="e-receipt-main-content">
  <ion-card class="main-Container ion-no-margin">
    <ion-card-content>
      <ion-col class="center">
        <app-header-logo></app-header-logo>
      </ion-col>
    </ion-card-content>

    <ion-card-content
      style="margin-top: 15%; padding-left: 0%; padding-right: 0%"
    >
      <ion-card class="custom-card" [routerLink]="['/activity-form']">
        <ion-row class="cards">
          <div style="display: flex; flex-direction: row">
            <ion-card-title class="card-texts"
              >Aktiviti<br />Tarikan</ion-card-title
            >
            <img src="../../assets/icon/tree.png" class="tree" />
          </div>
        </ion-row>
      </ion-card>

      <ion-card
        class="custom-card2"
        style="margin-top: 5%"
        [routerLink]="['/acco-form']"
      >
        <ion-row class="cards">
          <div style="display: flex; flex-direction: row">
            <ion-card-title class="card-texts"
              >Tempat <br />Penginapan</ion-card-title
            >
            <img src="../../assets/icon/house.png" class="house" />
          </div>
        </ion-row>
      </ion-card>

      <ion-card
        class="custom-card3"
        style="margin-top: 5%"
        [routerLink]="['/package-form']"
      >
        <ion-row class="cards">
          <div style="display: flex; flex-direction: row">
            <ion-card-title class="card-texts"
              >Pakej <br />Pelancongan</ion-card-title
            >
            <img
              src="../../assets/icon/pakej-removebg-preview.png"
              class="house"
            />
          </div>
        </ion-row>
      </ion-card>
    </ion-card-content>
  </ion-card>
</ion-content>
