<ion-content fullscreen class="faq-background">
  <div class="faq-overlay">
    <div class="faq-container">
      <!-- Back button inside the card, top-left -->
      <ion-buttons class="back-btn-wrapper">
        <ion-back-button
          defaultHref="/home"
          icon="arrow-back-outline"
          text=""
          class="circle-back-btn"
        ></ion-back-button>
      </ion-buttons>

      <app-header-logo></app-header-logo>

      <!-- Page title -->
      <div class="custom-header">
        Soalan Lazim/<em>Frequently Asked Questions (FAQ)</em>
      </div>

      <!-- Search bar - filters FAQ items as the user types -->
      <div class="search-wrapper">
        <div class="custom-search">
          <input
            type="text"
            placeholder="Search keyword here..."
            aria-label="Search FAQs"
            (input)="onSearch($event)"
            [value]="searchQuery"
            class="search-input"
          />
          <ion-icon name="search-outline" class="search-icon"></ion-icon>
        </div>
      </div>

      <!-- Accordion group - shows filtered FAQ items -->
      <ion-accordion-group expand="inset">
        <!-- Loop through filteredFaqs; each item renders one accordion card -->
        <ion-card *ngFor="let faq of filteredFaqs">
          <ion-accordion [value]="faq.value">
            <!-- Accordion header: shows the question -->
            <ion-item slot="header">
              <ion-label class="ion-text-wrap">{{ faq.question }}</ion-label>
            </ion-item>

            <!-- Accordion content: shows the answer, optional images, and optional link -->
            <div class="ion-padding answer-content" slot="content">
              {{ faq.answer }}

              <!-- Show images only if this FAQ item has images (e.g. forgot password steps) -->
              <ng-container *ngIf="faq.images && faq.images.length">
                <ion-img
                  *ngFor="let img of faq.images"
                  class="account_img"
                  [src]="img"
                  alt="FAQ related image"
                >
                </ion-img>
              </ng-container>

              <!-- Show a link only if this FAQ item has a link (e.g. tutorial video) -->
              <ng-container *ngIf="faq.link">
                <br /><br />
                <a
                  [href]="faq.link.url"
                  target="_blank"
                  rel="noopener noreferrer"
                  >{{ faq.link.label }}</a
                >
              </ng-container>
            </div>
          </ion-accordion>
        </ion-card>

        <!-- Message shown when no FAQ matches the search keyword -->
        <div *ngIf="filteredFaqs.length === 0" class="no-results">
          No results found for "{{ searchQuery }}"
        </div>
      </ion-accordion-group>
    </div>
  </div>
</ion-content>
