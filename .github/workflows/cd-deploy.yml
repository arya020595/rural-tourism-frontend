# ============================================
# Rural Tourism Frontend - CD Deploy
# ============================================
# Deploy to production server via SSH
# Triggered after CD Build succeeds on main branch

name: CD Deploy

on:
  workflow_run:
    workflows: ["CD Build"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Set deployment start time
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Notify Slack - Deployment Starting
        run: |
          set -e

          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          FULL_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          ACTOR='${{ github.actor }}'
          RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          COMMIT_MSG=$(echo ${{ toJson(github.event.workflow_run.head_commit.message || 'Manual dispatch') }} | sed 's/\\n/\n/g')

          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg runurl "$RUN_URL" \
            '{
              text: ":rocket: Frontend deployment started",
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚀 Frontend Deployment Started" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n" + $repo) },
                    { type: "mrkdwn", text: ("*Branch:*\n" + $branch) },
                    { type: "mrkdwn", text: ("*Commit:*\n" + $sha) },
                    { type: "mrkdwn", text: ("*Actor:*\n" + $actor) }
                  ]
                },
                { type: "section", text: { type: "mrkdwn", text: ("*Message:*\n" + $msg) } },
                { type: "context", elements: [
                    { type: "mrkdwn", text: ("<" + $runurl + "|View workflow run>") }
                  ]
                }
              ]
            }')
          echo "$payload" | curl -s -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL" || echo "Warning: Failed to send Slack notification"
          echo "Sent Slack start notification"
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            cd ~/st_rural_tourism

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull latest frontend image
            docker compose pull frontend

            # Restart frontend
            docker compose up -d frontend

            # Clean up old images
            docker image prune -f

            # Verify health
            sleep 5
            docker compose ps

      - name: Notify Slack - Deployment Result
        if: always()
        run: |
          set -e
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          FULL_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          ACTOR='${{ github.actor }}'
          RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          STATUS='${{ job.status }}'
          END_TIME=$(date +%s)
          DURATION=$(( END_TIME - START_TIME ))
          HUMAN_DURATION=$(printf '%02dm:%02ds' $((DURATION/60)) $((DURATION%60)))
          COMMIT_MSG=$(echo ${{ toJson(github.event.workflow_run.head_commit.message || 'Manual dispatch') }} | sed 's/\\n/\n/g')

          if [ "$STATUS" = "success" ]; then
            TITLE="✅ Frontend Deployment Succeeded"
            RESULT_LINE="*Result:* Success"
            COLOR="#2eb886"
          else
            TITLE="❌ Frontend Deployment Failed"
            RESULT_LINE="*Result:* Failure"
            COLOR="#e01e5a"
          fi

          payload=$(jq -n \
            --arg color "$COLOR" \
            --arg title "$TITLE" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg runurl "$RUN_URL" \
            --arg result "$RESULT_LINE" \
            --arg dur "$HUMAN_DURATION" \
            '{
              text: $title,
              blocks: [
                { type: "header", text: { type: "plain_text", text: $title } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n" + $repo) },
                    { type: "mrkdwn", text: ("*Branch:*\n" + $branch) },
                    { type: "mrkdwn", text: ("*Commit:*\n" + $sha) },
                    { type: "mrkdwn", text: ("*Actor:*\n" + $actor) },
                    { type: "mrkdwn", text: $result },
                    { type: "mrkdwn", text: ("*Duration:*\n" + $dur) }
                  ]
                },
                { type: "section", text: { type: "mrkdwn", text: ("*Message:*\n" + $msg) } },
                { type: "context", elements: [
                    { type: "mrkdwn", text: ("<" + $runurl + "|View workflow run>") }
                  ]
                }
              ]
            }')
          echo "$payload" | curl -s -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL" || echo "Warning: Failed to send Slack notification"
          echo "Sent Slack result notification ($STATUS)"
